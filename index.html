<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Crolana — Professional NFT & DeFi Launchpad for Cronos and Solana" />
    <meta name="theme-color" content="#020817" />

    <!-- Open Graph -->
    <meta property="og:title" content="Crolana" />
    <meta property="og:description" content="NFT & DeFi Launchpad for Cronos and Solana" />
    <meta property="og:type" content="website" />

    <title>Crolana</title>
    <link rel="icon" type="image/png" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />

    <!-- ═══════════════════════════════════════════════════════════════════
         BUFFER POLYFILL — must run SYNCHRONOUSLY before any ES module.
         Metaplex's SES lockdown (lockdown-install.js) strips globals from
         the realm after modules load. Injecting Buffer here — before the
         <script type="module"> — means it exists on window BEFORE SES runs
         and SES cannot remove window properties set before lockdown.
         ═══════════════════════════════════════════════════════════════════ -->
    <script>
      // Inline minimal Buffer shim so the SES-safe environment has it.
      // The full 'buffer' npm package is loaded by main.tsx; this just
      // prevents the "Buffer is not defined" crash during SES lockdown.
      if (typeof window !== 'undefined' && typeof window.Buffer === 'undefined') {
        // Minimal Buffer shim — enough for SES lockdown to not crash.
        // The real implementation from the 'buffer' npm package overwrites
        // this in polyfills.ts before any Solana code actually runs.
        window.Buffer = {
          isBuffer: function() { return false; },
          from: function(data, enc) {
            if (typeof data === 'string') {
              return new TextEncoder().encode(data);
            }
            return new Uint8Array(data);
          },
          alloc: function(size) { return new Uint8Array(size); },
          allocUnsafe: function(size) { return new Uint8Array(size); },
          concat: function(list) {
            var total = list.reduce(function(s, b) { return s + b.length; }, 0);
            var out = new Uint8Array(total);
            var offset = 0;
            list.forEach(function(b) { out.set(b, offset); offset += b.length; });
            return out;
          },
          byteLength: function(s) { return new TextEncoder().encode(s).length; },
        };
        // Also set on globalThis so modules using `globalThis.Buffer` find it
        globalThis.Buffer = window.Buffer;
      }
    </script>

    <!-- Prevent FOUC (Flash of Unstyled Content) for dark theme -->
    <script>
      try {
        const t = JSON.parse(localStorage.getItem('crolana-theme') || '{}');
        if (t.bgBase) document.documentElement.style.setProperty('--bg-base', t.bgBase);
      } catch {}
      if (!document.documentElement.style.getPropertyValue('--bg-base')) {
        document.documentElement.style.setProperty('--bg-base', '#020817');
      }
      document.documentElement.style.background = 'var(--bg-base)';
    </script>
  </head>
  <body style="margin:0;background:#020817">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
