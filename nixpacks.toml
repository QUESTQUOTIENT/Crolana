# nixpacks.toml — Railway build configuration
# Forces Node 20 (required by Vite 6, React Router 7, Solana packages)
# Uses npm install instead of npm ci to tolerate lock file drift

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install --legacy-peer-deps --no-audit --prefer-offline"
]

[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build"
]

[start]
cmd = "npm run start"
